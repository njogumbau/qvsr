name: Paper
on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  paper:
    runs-on: ubuntu-latest
    name: Paper
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build Paper
        uses: openjournals/openjournals-draft-action@v1.0
        with:
          journal: joss
          paper-path: paper.md
      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: paper
          path: paper.pdf
